<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lunar Lander Crash &mdash; lunatespace.com</title>
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #e8e8ec;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 16px 64px;
    text-align: center;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin: 0 0 4px;
  }
  p.sub {
    margin: 0 0 20px;
    color: #9a9aa5;
    font-size: 0.9rem;
  }
  .player {
    position: relative;
    width: 100%;
    aspect-ratio: 640 / 400;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 0 1px #26262e;
  }
  .player img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .player .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: #7a7a85;
  }
  .controls {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 0.85rem;
    color: #9a9aa5;
  }
  button {
    background: #1b1b22;
    color: #e8e8ec;
    border: 1px solid #33333c;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  button:hover {
    background: #26262e;
  }
  a.back {
    display: inline-block;
    margin-top: 28px;
    color: #7a9aff;
    font-size: 0.85rem;
    text-decoration: none;
  }
  a.back:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<main>
  <h1>Lunar Lander Crash</h1>
  <p class="sub">100 frames, played back at 10 frames per second</p>

  <div class="player" id="player">
    <div class="loading" id="loading">loading frames&hellip;</div>
  </div>

  <div class="controls">
    <button id="toggle" type="button">Pause</button>
    <span id="frameLabel">frame 1 / 100</span>
  </div>

  <a class="back" href="index.html">&larr; back home</a>
</main>

<script>
(function () {
  var FRAME_COUNT = 100;
  var FPS = 10;
  function frameSrc(i) {
    var n = String(i).padStart(3, "0");
    return "lunar-lander-frame-" + n + ".jpg";
  }

  var player = document.getElementById("player");
  var loading = document.getElementById("loading");
  var toggleBtn = document.getElementById("toggle");
  var frameLabel = document.getElementById("frameLabel");

  var images = [];
  var loadedCount = 0;

  for (var i = 0; i < FRAME_COUNT; i++) {
    var img = new Image();
    img.src = frameSrc(i);
    img.alt = "Lunar lander animation frame " + (i + 1);
    img.style.display = "none";
    img.onload = function () {
      loadedCount++;
      if (loadedCount === FRAME_COUNT) {
        loading.remove();
        start();
      }
    };
    player.appendChild(img);
    images.push(img);
  }

  var current = 0;
  var playing = true;
  var timer = null;

  function show(index) {
    for (var i = 0; i < images.length; i++) {
      images[i].style.display = i === index ? "block" : "none";
    }
    frameLabel.textContent = "frame " + (index + 1) + " / " + FRAME_COUNT;
  }

  function tick() {
    current = (current + 1) % FRAME_COUNT;
    show(current);
  }

  function start() {
    show(current);
    timer = setInterval(tick, 1000 / FPS);
  }

  toggleBtn.addEventListener("click", function () {
    playing = !playing;
    if (playing) {
      toggleBtn.textContent = "Pause";
      timer = setInterval(tick, 1000 / FPS);
    } else {
      toggleBtn.textContent = "Play";
      clearInterval(timer);
    }
  });
})();
</script>
</body>
</html>
